<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Beth Website Admin — Log In</title>
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body class="admin-body admin-body--center">
  <main class="login-card">
    <h1 class="login-card__title">Beth Website Admin</h1>
    <p class="login-card__intro">Please log in to manage research ideas and contact requests.</p>

    <form id="loginForm" class="login-form" novalidate>
      <div class="field">
        <label class="field__label" for="password">Password</label>
        <input
          class="field__input"
          type="password"
          id="password"
          name="password"
          autocomplete="current-password" />
      </div>
      <button class="btn btn--primary" type="submit" id="loginSubmit">Log In</button>
      <p class="admin-status" id="loginStatus" role="status" aria-live="polite"></p>
    </form>

    <p class="login-card__back"><a href="/">← Back to the public website</a></p>
  </main>

  <script src="/admin/login.js"></script>
</body>
</html>
